<!DOCTYPE HTML>
<html>
<head>
  <title>Order History - SilverStar Parts</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    :root {
      --orders-bg: #eaeded;
      --card-bg: #ffffff;
      --text-main: #0f1111;
      --text-soft: #565959;
      --border: #d5d9d9;
      --link: #007185;
      --success: #067d62;
    }

    body {
      background: var(--orders-bg);
      color: var(--text-main);
    }

    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .orders-header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .orders-header a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }

    .orders-list {
      display: grid;
      gap: 1rem;
    }

    .order-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(15, 17, 17, 0.05);
      overflow: hidden;
    }

    .order-top {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #f7fafa;
      border-bottom: 1px solid var(--border);
    }

    .order-top .label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-soft);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .order-top .value {
      font-weight: 700;
      word-break: break-word;
    }

    .order-body {
      padding: 1.25rem;
    }

    .order-customer {
      margin-bottom: 1rem;
      color: var(--text-soft);
    }

    .order-items {
      display: grid;
      gap: 0.9rem;
    }

    .order-item {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: center;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid #eef1f1;
    }

    .order-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .order-item img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border: 1px solid #eef1f1;
      border-radius: 8px;
      background: #fff;
      padding: 0.25rem;
    }

    .order-item-name {
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .order-item-meta {
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .order-item-price {
      font-weight: 700;
      white-space: nowrap;
    }

    .status-badge {
      display: inline-block;
      margin-top: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: rgba(6, 125, 98, 0.12);
      color: var(--success);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .orders-empty {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }

    .orders-empty p {
      color: var(--text-soft);
      margin-bottom: 1rem;
    }

    @media screen and (max-width: 840px) {
      .order-top {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media screen and (max-width: 640px) {
      .order-top {
        grid-template-columns: 1fr;
      }

      .order-item {
        grid-template-columns: 1fr;
      }

      .order-item-price {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="main">
      <div class="inner">

        <div class="orders-header">
          <h1>Order History</h1>
          <a href="generic.html">Continue shopping</a>
        </div>

        <div id="ordersList" class="orders-list"></div>

      </div>
    </div>

    <div id="sidebar">
      <div class="inner">
        <nav id="menu">
          <header class="major">
            <h2>Menu</h2>
          </header>
          <ul>
            <li><a href="index.html">Homepage</a></li>
            <li><a href="generic.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="orderhistory.html">Order History</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </div>

  <script>
    const ordersList = document.getElementById("ordersList");

    function formatPrice(value) {
      return `€${Number(value || 0).toFixed(2)}`;
    }

    function formatDate(value) {
      if (!value) return "N/A";
      const date = new Date(value);
      return date.toLocaleString("en-GB", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function loadOrders() {
      try {
        const res = await fetch("/api/orders");
        const orders = await res.json();

        if (!Array.isArray(orders) || orders.length === 0) {
          ordersList.innerHTML = `
            <div class="orders-empty">
              <h3>No orders yet</h3>
              <p>Your placed orders will appear here.</p>
              <a href="generic.html" class="button primary">Browse Products</a>
            </div>
          `;
          return;
        }

        ordersList.innerHTML = "";

        orders.reverse().forEach((order) => {
          const itemsHtml = (order.items || []).map((item) => {
            const productName = item.name || item.product?.name || "Product";
            const productImage = item.image || item.product?.image || "images/pic01.jpg";
            const quantity = Number(item.quantity || 1);
            const price = Number(item.price || item.product?.price || 0);
            const total = price * quantity;

            return `
              <div class="order-item">
                <img src="${productImage}" alt="${productName}" />
                <div>
                  <div class="order-item-name">${productName}</div>
                  <div class="order-item-meta">Quantity: ${quantity}</div>
                  <div class="order-item-meta">Unit price: ${formatPrice(price)}</div>
                </div>
                <div class="order-item-price">${formatPrice(total)}</div>
              </div>
            `;
          }).join("");

          const orderTotal = (order.items || []).reduce((sum, item) => {
            const price = Number(item.price || item.product?.price || 0);
            const qty = Number(item.quantity || 1);
            return sum + (price * qty);
          }, 0);

          const card = document.createElement("article");
          card.className = "order-card";
          card.innerHTML = `
            <div class="order-top">
              <div>
                <span class="label">Order placed</span>
                <span class="value">${formatDate(order.createdAt)}</span>
              </div>
              <div>
                <span class="label">Total</span>
                <span class="value">${formatPrice(orderTotal)}</span>
              </div>
              <div>
                <span class="label">Customer</span>
                <span class="value">${order.customerName || "N/A"}</span>
              </div>
              <div>
                <span class="label">Email</span>
                <span class="value">${order.customerEmail || "N/A"}</span>
              </div>
            </div>

            <div class="order-body">
              <div class="order-customer">
                <span class="status-badge">Order placed</span>
              </div>
              <div class="order-items">${itemsHtml}</div>
            </div>
          `;

          ordersList.appendChild(card);
        });

      } catch (error) {
        ordersList.innerHTML = `
          <div class="orders-empty">
            <h3>Could not load orders</h3>
            <p>Please check your backend route for <strong>/api/orders</strong>.</p>
          </div>
        `;
      }
    }

    loadOrders();
  </script>
</body>
</html>
